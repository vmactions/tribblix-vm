  testerr:
    strategy:
      fail-fast: false
    runs-on: ubuntu-24.04
    name: test default error Tribblix
    steps:
    - uses: actions/checkout@v6
    - name: Test in Tribblix
      id: testerr
      continue-on-error: true
      uses: vmactions/tribblix-vm@f18a688137467fe2b1537cef0fa70c1206337bbf
      with:
        usesh: true
        debug: true
        run: |
