
name: Test

on:
  workflow_dispatch:
  release:
    types: [ published ]
  push:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/test.yml'
      - 'index.js'
      - 'conf/*'
      - 'hooks/*'



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  testsshfs:
    strategy:
      fail-fast: false
      matrix:
        release: [ "0m39", "0m40", ""]
        arch: [ "aarch64", "", "riscv64", "powerpc64", "sparc64", "ppc64le", "s390x"]
        runs: [ "ubuntu-24.04", "ubuntu-24.04-arm"]
        exclude:
          - runs: "ubuntu-24.04-arm"
            arch: ""
          - runs: "ubuntu-24.04-arm"
            arch: "riscv64"
          - runs: "ubuntu-24.04-arm"
            arch: "powerpc64"
          - runs: "ubuntu-24.04-arm"
            arch: "sparc64"
          - runs: "ubuntu-24.04-arm"
            arch: "ppc64le"
          - runs: "ubuntu-24.04-arm"
            arch: "s390x"
          # Manual matrix excludes only; combos with no conf are auto-excluded.
          - release: "0m39"
            arch: aarch64
          - release: "0m39"
            arch: riscv64
          - release: "0m39"
            arch: powerpc64
          - release: "0m39"
            arch: sparc64
          - release: "0m39"
            arch: ppc64le
          - release: "0m39"
            arch: s390x
          - release: "0m40"
            arch: aarch64
          - release: "0m40"
            arch: riscv64
          - release: "0m40"
            arch: powerpc64
          - release: "0m40"
            arch: sparc64
          - release: "0m40"
            arch: ppc64le
          - release: "0m40"
            arch: s390x
          - release: ""
            arch: aarch64
          - release: ""
            arch: riscv64
          - release: ""
            arch: powerpc64
          - release: ""
            arch: sparc64
          - release: ""
            arch: ppc64le
          - release: ""
            arch: s390x


    runs-on: ${{ matrix.runs }}
    name: sshfs Tribblix
    env:
      MYTOKEN : ${{ secrets.MYTOKEN }}
      MYTOKEN2: "value2"
      DEBUG: 1
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
#    - name: Creating Web console
#      if: ${{ contains(fromJSON('{"x86_64":["rsync","scp","nfs"],"aarch64":[],"riscv64":[],"powerpc64":[],"sparc64":[],"ppc64le":[],"s390x":[]}')[matrix.arch == '' && 'x86_64' || matrix.arch], 'sshfs') }}
#      uses: vmactions/cf-tunnel@v0
#      id: tunnel
#      with:
#        protocol: http
#        port: 8000

    - name: Test in Tribblix
      if: ${{ contains(fromJSON('{"x86_64":["rsync","scp","nfs"],"aarch64":[],"riscv64":[],"powerpc64":[],"sparc64":[],"ppc64le":[],"s390x":[]}')[matrix.arch == '' && 'x86_64' || matrix.arch], 'sshfs') }}
      id: test
      uses: vmactions/tribblix-vm@f18a688137467fe2b1537cef0fa70c1206337bbf
      with:
        envs: 'DEBUG MYTOKEN MYTOKEN2'
        prepare: |
          
        mem: 4096
        release: ${{ matrix.release }}
        arch: ${{ matrix.arch }}
        nat: |
          "20022": "22"
          "8080": "80"
          "8443": "443"
          udp:"8081": "80"
        usesh: true
        debug: true
        debug-on-error: ${{ vars.DEBUG_ON_ERROR }}
        sync: sshfs
        run: |
          set -e
          ls -lah $HOME/work
          if [ -z "$(ls -A $HOME/work)" ]; then
            echo "sshfs error."
            exit 1
          fi
          echo "TEST_ENV=abc" >>${GITHUB_ENV}
          echo "textfromvm" >$GITHUB_WORKSPACE/vm.txt
          if [ -n "test" ]; then
            echo "false"
          fi
          if [ "test" ]; then
            echo "test"
          fi
          pwd
          ls -lah
          pwd
          env
          uname -a
          cat /etc/release
          echo "OK"

    - name: Test NAT
      if: ${{ contains(fromJSON('{"x86_64":["rsync","scp","nfs"],"aarch64":[],"riscv64":[],"powerpc64":[],"sparc64":[],"ppc64le":[],"s390x":[]}')[matrix.arch == '' && 'x86_64' || matrix.arch], 'sshfs') }}
      env:
        VM_USER: ""
      run: |
        set -e
        echo "TEST_ENV=$TEST_ENV"
        [ "$TEST_ENV" = "abc" ]
        ssh -v -p 20022 ${VM_USER:-root}@localhost  "uname -a;whoami;pwd"
    - name: Test custom shell
      if: ${{ contains(fromJSON('{"x86_64":["rsync","scp","nfs"],"aarch64":[],"riscv64":[],"powerpc64":[],"sparc64":[],"ppc64le":[],"s390x":[]}')[matrix.arch == '' && 'x86_64' || matrix.arch], 'sshfs') }}
      shell: tribblix {0}
      run: |
        pwd
          if [ -n "test" ]; then
            echo "false"
          fi
          if [ "test" ]; then
            echo "test"
          fi
          pwd
          ls -lah
          pwd
          env
          uname -a
          cat /etc/release
          echo "OK"






